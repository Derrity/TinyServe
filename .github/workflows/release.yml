name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-22.04
            cross: false
          - target: linux-arm64
            os: ubuntu-22.04
            cross: true
          - target: darwin-arm64
            os: macos-latest
            cross: false

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      # ── Linux native (amd64) ──
      - name: Install deps (Linux amd64)
        if: matrix.target == 'linux-amd64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake pkg-config libuv1-dev

      - name: Build (Linux amd64)
        if: matrix.target == 'linux-amd64'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS="-O2"
          cmake --build build -j$(nproc)
          strip build/tinyserve

      # ── Linux cross (arm64) ──
      - name: Install deps & cross-build libuv (Linux arm64)
        if: matrix.target == 'linux-arm64'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq cmake gcc-aarch64-linux-gnu

          # Build libuv from source for aarch64
          git clone --depth 1 --branch v1.48.0 https://github.com/libuv/libuv.git /tmp/libuv-src
          cmake -S /tmp/libuv-src -B /tmp/libuv-build \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_INSTALL_PREFIX=/tmp/libuv-arm64 \
            -DCMAKE_INSTALL_LIBDIR=lib \
            -DBUILD_TESTING=OFF \
            -DLIBUV_BUILD_SHARED=OFF
          cmake --build /tmp/libuv-build -j$(nproc)
          cmake --install /tmp/libuv-build

      - name: Build (Linux arm64)
        if: matrix.target == 'linux-arm64'
        run: |
          cmake -S . -B build \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_SYSTEM_NAME=Linux \
            -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-O2" \
            -DCMAKE_PREFIX_PATH=/tmp/libuv-arm64 \
            -DLIBUV_INCLUDE_DIRS=/tmp/libuv-arm64/include \
            -DLIBUV_LIBRARIES=/tmp/libuv-arm64/lib/libuv.a
          cmake --build build -j$(nproc)
          aarch64-linux-gnu-strip build/tinyserve

      # ── macOS ──
      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install libuv cmake pkg-config

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_FLAGS="-O2"
          cmake --build build -j$(sysctl -n hw.ncpu)
          strip build/tinyserve

      # ── Package ──
      - name: Package
        run: |
          ARTIFACT=tinyserve-${{ matrix.target }}
          cp build/tinyserve ${ARTIFACT}
          shasum -a 256 ${ARTIFACT} > ${ARTIFACT}.sha256
          echo "ARTIFACT=${ARTIFACT}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT }}
          path: |
            ${{ env.ARTIFACT }}
            ${{ env.ARTIFACT }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/tinyserve-*
